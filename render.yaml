services:
  - type: web
    name: detective-ai-backend
    runtime: node
    repo: https://github.com/manik-dey-89/Detective-Ai
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LLM_PROVIDER
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: COGNEE_API_KEY
        sync: false
      - key: COGNEE_BASE_URL
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: detective-ai-frontend
          type: web
          property: host

  - type: web
    name: detective-ai-frontend
    runtime: static
    repo: https://github.com/manik-dey-89/Detective-Ai
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
